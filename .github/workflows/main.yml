name: Ignition CI-CD

on:
  push:
    branches:
      - main

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Ignition Project
        run: |
          echo "Checking Ignition project structure..."

          if [ -f "project.json" ]; then
            echo "project.json found"
          else
            echo "project.json missing"
            exit 1
          fi

          echo "Ignition project validation successful"

      - name: Create Deployment Package
        run: |
          mkdir deployment
          cp -r * deployment/ || true
          tar -czf ignition-project.tar.gz deployment

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ignition-build
          path: ignition-project.tar.gz
